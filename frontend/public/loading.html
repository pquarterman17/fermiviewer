<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FermiViewer</title>
    <style>
      :root { color-scheme: dark; }
      html, body { height: 100%; margin: 0; }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.25rem;
        background: #16141d;
        color: #d8d4e0;
        font: 14px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
        -webkit-user-select: none;
        user-select: none;
      }
      .spinner {
        width: 34px;
        height: 34px;
        border: 3px solid #322d3f;
        border-top-color: #9a7cff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .title { font-size: 15px; font-weight: 600; letter-spacing: 0.02em; }
      .sub { font-size: 12.5px; color: #8b8598; }
      #error {
        display: none;
        max-width: 30rem;
        padding: 0.75rem 1rem;
        text-align: center;
        color: #ffb4a8;
        background: #2a1c1c;
        border: 1px solid #5a2d2d;
        border-radius: 8px;
      }
      @media (prefers-reduced-motion: reduce) {
        .spinner { animation: none; }
      }
    </style>
  </head>
  <body>
    <div class="spinner" id="spinner"></div>
    <div class="title">Starting FermiViewer…</div>
    <div class="sub" id="sub">Warming up the analysis engine</div>
    <div id="error"></div>
    <script>
      // The Tauri shell calls window.__fvError(msg) (via eval) if the
      // server never comes up, turning a blank "can't reach this page"
      // into an actionable message.
      window.__fvError = function (msg) {
        document.getElementById("spinner").style.display = "none";
        document.getElementById("sub").style.display = "none";
        var e = document.getElementById("error");
        e.textContent = msg;
        e.style.display = "block";
      };
    </script>
  </body>
</html>
