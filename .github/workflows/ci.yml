name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: CI only checks out and tests — it never writes to the
# repo, so the GITHUB_TOKEN needs read-only contents (CodeQL hardening).
permissions:
  contents: read

jobs:
  backend:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        # 3.10 = supported floor, 3.14 = latest; the floor catches accidental
        # use of newer-Python stdlib features outside a version guard
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python }}
      - name: Sync deps
        run: uv sync --group dev
      # Lint + type-check ONCE, pinned to 3.13: matches local dev, and the
      # numpy stubs are known-good there. They are OS-independent, and mypy
      # against the floor's older numpy stubs (numpy 2.2 on 3.10) reports
      # stub-version differences, not real issues.
      - name: Lint
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.13'
        run: uv run ruff check src tests
      - name: Type check
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.13'
        run: uv run mypy src
      - name: Tests
        # realdata/oracle tests skip in CI (corpus + rsciio absent), which
        # costs ~3.6 pts vs a local run — CI coverage is ~85%, so the gate
        # sits at 82 to leave headroom for normal churn without false-fails.
        run: uv run pytest -v --cov=fermiviewer --cov-report=term-missing --cov-fail-under=82

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Install
        run: npm ci
      - name: Unit tests (vitest)
        run: npm test
      - name: Build (includes typecheck)
        run: npm run build
