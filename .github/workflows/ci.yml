name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: ${{ matrix.python }}
      - name: Sync deps
        run: uv sync --group dev
      - name: Lint
        run: uv run ruff check src tests
      - name: Type check
        run: uv run mypy src
      - name: Tests
        # realdata/oracle tests skip automatically (corpus absent in CI)
        run: uv run pytest -v

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install
        run: npm install
      - name: Unit tests (vitest)
        run: npm test
      - name: Build (includes typecheck)
        run: npm run build
