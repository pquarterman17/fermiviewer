name: release

# Tag a version (v0.2.0 …) → build the SPA, the self-contained
# PyInstaller server sidecar and the Tauri NSIS installer, smoke-test
# the sidecar, and attach both artifacts to the GitHub Release.
# Repo stays binary-free — artifacts live on the Release only.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  windows-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build SPA
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Build server sidecar (PyInstaller)
        run: |
          uv sync --group bundle
          uv run pyinstaller tools/bundle/fv-server.spec --noconfirm --distpath dist-sidecar

      - name: Smoke-test the sidecar
        shell: pwsh
        run: |
          $p = Start-Process -FilePath "dist-sidecar/fv-server/fv-server.exe" `
                -ArgumentList "--no-browser","--no-auto-shutdown" -PassThru
          $ok = $false
          foreach ($i in 1..40) {
            try {
              $h = Invoke-RestMethod http://127.0.0.1:8000/api/health -TimeoutSec 2
              if ($h.status -eq "ok") { $ok = $true; break }
            } catch { Start-Sleep -Milliseconds 1000 }
          }
          $spa = (Invoke-WebRequest http://127.0.0.1:8000/ -UseBasicParsing).StatusCode
          Stop-Process -Id $p.Id -Force
          if (-not $ok -or $spa -ne 200) { throw "sidecar smoke failed (health=$ok spa=$spa)" }
          Write-Host "sidecar healthy, SPA served"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build Tauri installer (sidecar as bundled resource)
        working-directory: src-tauri
        shell: pwsh
        run: |
          npx --yes "@tauri-apps/cli@^2" build --config `
            '{"bundle":{"resources":{"../dist-sidecar/fv-server":"fv-server"}}}'

      - name: Zip standalone server (no-installer option)
        shell: pwsh
        run: |
          Compress-Archive -Path dist-sidecar/fv-server `
            -DestinationPath fv-server-win64.zip

      - name: Attach artifacts to the Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            fv-server-win64.zip
          generate_release_notes: true
