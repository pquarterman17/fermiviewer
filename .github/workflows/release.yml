name: release

# Tag a version (v0.2.0 …) → on each OS build the SPA, the self-contained
# PyInstaller server sidecar and the native Tauri installer, smoke-test the
# sidecar, and attach the installer + a standalone server archive to the
# GitHub Release. Repo stays binary-free — artifacts live on the Release only.
#
# Release notes: softprops seeds the Release with GitHub's auto-generated
# commit list; the `release-notes` job then replaces it with the curated
# CHANGELOG.md section for the tag (falling back to the auto list if there is
# no matching section). Keep CHANGELOG.md updated in the release commit.
#
# Per-OS installer targets:
#   windows-latest → NSIS .exe
#   macos-latest   → .dmg   (unsigned; Gatekeeper right-click-open on first run)
#   ubuntu-latest  → .deb   (AppImage's linuxdeploy can't resolve the
#                            PyInstaller sidecar's vendored numpy/scipy
#                            .so files; .deb skips linuxdeploy entirely)

on:
  push:
    tags: ["v*"]
  # Manual dry run: builds + smoke-tests + uploads artifacts, but does NOT
  # create or attach to a GitHub Release (no tag context). Use this to
  # validate the pipeline without cutting a version.
  #
  # publish_pypi input: dispatch with this ON to publish the CURRENT
  # pyproject version to PyPI without cutting a new tag (used for the
  # initial v0.1.12 backfill). With it on, the installer dry-run matrix is
  # skipped — the dispatch means "PyPI only". Tag pushes always publish.
  workflow_dispatch:
    inputs:
      publish_pypi:
        description: "Publish the wheel to PyPI (backfill; skips installer dry-run)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  installers:
    name: ${{ matrix.label }}
    # skipped when a dispatch asks for a PyPI-only backfill publish; on tag
    # pushes `inputs` is empty so this stays truthy and the matrix runs
    if: ${{ !inputs.publish_pypi }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows
            bundles: nsis
            installer-glob: src-tauri/target/release/bundle/nsis/*.exe
            # Tauri v2 NSIS signs the installer .exe itself (no .nsis.zip);
            # the .exe is attached via installer-glob, so the updater only
            # needs its sibling .sig. Signed via the TAURI_SIGNING_* secrets.
            updater-glob: src-tauri/target/release/bundle/nsis/*-setup.exe.sig
            server-archive: fv-server-win64.zip
            offline-archive: fv-offline-win64.zip
          - os: macos-latest
            label: macos
            bundles: dmg
            installer-glob: src-tauri/target/release/bundle/dmg/*.dmg
            # auto-update is Windows-only for now (unsigned macOS would trip
            # Gatekeeper on relaunch); don't publish a darwin updater entry.
            # Re-add this glob when macOS gets Developer-ID signing/notarizing.
            updater-glob: ""
            server-archive: fv-server-macos.tar.gz
            offline-archive: fv-offline-macos-arm64.zip
          - os: ubuntu-latest
            label: linux
            bundles: deb
            installer-glob: src-tauri/target/release/bundle/deb/*.deb
            # .deb is not an updater target — Linux stays manual install
            updater-glob: ""
            server-archive: fv-server-linux.tar.gz
            offline-archive: fv-offline-linux-x64.zip
    steps:
      - uses: actions/checkout@v7

      - name: Install Linux build deps (Tauri)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev patchelf \
            libayatana-appindicator3-dev libxdo-dev file

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build SPA
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"

      - name: Build server sidecar (PyInstaller)
        run: |
          uv sync --group bundle
          uv run pyinstaller tools/bundle/fv-server.spec --noconfirm --distpath dist-sidecar

      - name: Smoke-test the sidecar (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $p = Start-Process -FilePath "dist-sidecar/fv-server/fv-server.exe" `
                -ArgumentList "--no-browser","--no-auto-shutdown" -PassThru
          $ok = $false
          foreach ($i in 1..40) {
            try {
              $h = Invoke-RestMethod http://127.0.0.1:8000/api/health -TimeoutSec 2
              if ($h.status -eq "ok") { $ok = $true; break }
            } catch { Start-Sleep -Milliseconds 1000 }
          }
          $spa = (Invoke-WebRequest http://127.0.0.1:8000/ -UseBasicParsing).StatusCode
          Stop-Process -Id $p.Id -Force
          if (-not $ok -or $spa -ne 200) { throw "sidecar smoke failed (health=$ok spa=$spa)" }
          Write-Host "sidecar healthy, SPA served"

      - name: Smoke-test the sidecar (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          ./dist-sidecar/fv-server/fv-server --no-browser --no-auto-shutdown &
          pid=$!
          ok=0
          for i in $(seq 1 40); do
            if curl -sf http://127.0.0.1:8000/api/health | grep -qE '"status": *"ok"'; then
              ok=1; break
            fi
            sleep 1
          done
          spa=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/ || echo 000)
          kill "$pid" 2>/dev/null || true
          if [ "$ok" != "1" ] || [ "$spa" != "200" ]; then
            echo "sidecar smoke failed (health=$ok spa=$spa)"; exit 1
          fi
          echo "sidecar healthy, SPA served"

      # Source-install kit for air-gapped machines: fermiviewer wheel (SPA
      # baked in by hatch_build.py) + full dependency wheelhouse + stdlib
      # installer. Reuses the SPA built above; uv fetches each covered
      # Python so pip resolves markers natively per version.
      - name: Build offline source-install bundle
        run: uv run python tools/offline/make_bundle.py --out ${{ matrix.offline-archive }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Write bundle-resource config override
        shell: bash
        run: |
          cat > src-tauri/ci.resources.json <<'JSON'
          { "bundle": { "resources": { "../dist-sidecar/fv-server": "fv-server" } } }
          JSON

      - name: Build Tauri installer (sidecar as bundled resource)
        working-directory: src-tauri
        env:
          # sign the updater artifacts so installed apps accept the update
          # (createUpdaterArtifacts is on in tauri.conf.json)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        # Pin the CLI to the resolved `tauri` crate version (Cargo.lock = 2.11.2)
        # instead of floating @^2. The Windows NSIS uninstall-key + shortcut
        # naming scheme must stay byte-identical across releases so each new
        # installer recognizes and *replaces* the previous version — a CLI that
        # drifts between builds can change that scheme and leave a duplicate in
        # "Installed apps". Bump this in lockstep with the tauri crate.
        # (The other upgrade-safety invariants are stable in tauri.conf.json:
        #  productName "FermiViewer", identifier app.fermiviewer.desktop,
        #  nsis.installMode "currentUser" — never change these or mix per-machine
        #  installs, or Windows will treat the result as a separate app.)
        run: >
          npx --yes "@tauri-apps/cli@2.11.2" build
          --bundles ${{ matrix.bundles }}
          --config ci.resources.json

      - name: Archive standalone server (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist-sidecar/fv-server -DestinationPath ${{ matrix.server-archive }}

      - name: Archive standalone server (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: tar -C dist-sidecar -czf ${{ matrix.server-archive }} fv-server

      - name: Upload artifacts (workflow run — always)
        uses: actions/upload-artifact@v7
        with:
          name: fv-${{ matrix.label }}
          path: |
            ${{ matrix.installer-glob }}
            ${{ matrix.server-archive }}
            ${{ matrix.offline-archive }}
          if-no-files-found: error

      - name: Attach artifacts to the Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ${{ matrix.installer-glob }}
            ${{ matrix.updater-glob }}
            ${{ matrix.server-archive }}
            ${{ matrix.offline-archive }}
          generate_release_notes: true

  # Build the updater manifest (latest.json) AFTER all installers have
  # attached their signed updater bundles + .sig files to the Release. The
  # installed app's endpoint (releases/latest/download/latest.json) reads
  # this to discover + verify the newest build. Tag releases only.
  updater-manifest:
    name: updater manifest
    needs: installers
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Generate and upload latest.json
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          base="https://github.com/$REPO/releases/download/$TAG"
          assets=$(gh release view "$TAG" --repo "$REPO" --json assets --jq '.assets[].name')
          # Tauri v2 NSIS: the updater artifact IS the installer .exe, signed
          # with a sibling .sig (no .nsis.zip). Auto-update is Windows-only.
          nsis=$(printf '%s\n' "$assets" | grep -E '\-setup\.exe$' | head -1 || true)
          if [ -z "$nsis" ]; then
            echo "::error::no -setup.exe found on $TAG"; exit 1
          fi
          gh release download "$TAG" --repo "$REPO" --pattern "${nsis}.sig" --dir sigs
          sig=$(cat "sigs/${nsis}.sig")
          jq -n --arg v "$version" --arg s "$sig" --arg u "$base/$nsis" \
            '{version:$v, pub_date:(now|todate),
              platforms:{"windows-x86_64":{signature:$s,url:$u}}}' > latest.json
          echo "--- latest.json ---"; cat latest.json
          gh release upload "$TAG" latest.json --repo "$REPO" --clobber

  # Replace the auto-generated commit list on the Release with the curated
  # CHANGELOG.md section for this tag. Runs after installers so the Release
  # already exists (softprops creates it). If CHANGELOG.md has no section
  # matching the tag, the auto-generated notes are left in place as a fallback.
  release-notes:
    name: release notes
    needs: installers
    # always(): a flaky artifact upload in one installer leg must not suppress
    # the curated notes — the release already exists once any leg attaches, so
    # `gh release edit` can still set the body.
    if: ${{ always() && startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set curated notes from CHANGELOG.md
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          # Print the CHANGELOG section for this version: everything after the
          # `## [X.Y.Z]` header up to (not including) the next `## [` header.
          # Match the header with index() (literal prefix) rather than a
          # built-up regex — a dynamic "\\[" is parsed as a character class.
          awk -v tag="$version" '
            index($0, "## [" tag "]") == 1 { grab = 1; next }
            grab && /^## \[/               { exit }
            grab                            { print }
          ' CHANGELOG.md > notes.md || true
          # Drop leading blank lines so the body starts at the first heading.
          sed -i -e '/./,$!d' notes.md
          if [ -s notes.md ]; then
            echo "Setting curated notes for $TAG:"; echo "---"; cat notes.md; echo "---"
            gh release edit "$TAG" --repo "$REPO" --notes-file notes.md
          else
            echo "No CHANGELOG.md section for $version; keeping auto-generated notes."
          fi

  # Publish the pure-Python wheel to PyPI so `pip install fermiviewer` /
  # `uv tool install fermiviewer` work. WHEEL-ONLY on purpose: the SPA is
  # baked in by hatch_build.py only for wheel builds, so an sdist would
  # pip-compile into a UI-less install for anyone building from source —
  # and with a py3-none-any wheel available, pip never needs the sdist.
  #
  # Auth is PyPI Trusted Publishing (GitHub OIDC via the `pypi` environment
  # + id-token permission) — no API-token secret exists or is needed.
  # Runs independently of the installer matrix: the wheel gates on its own
  # boot smoke below, and a broken .dmg shouldn't block the PyPI artifact.
  pypi:
    name: publish to PyPI
    if: startsWith(github.ref, 'refs/tags/') || inputs.publish_pypi
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v7

      # PyPI uploads are immutable — a version number, once burned, is gone
      # even after a yank. Refuse to publish a tag whose pyproject version
      # doesn't match it (dispatch backfills have no tag; they publish
      # whatever pyproject says, which is the point).
      - name: Guard - tag matches pyproject version
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TAG: ${{ github.ref_name }}
        run: |
          v=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "v$v" != "$TAG" ]; then
            echo "::error::pyproject version $v does not match tag $TAG"; exit 1
          fi

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # must precede `uv build` — hatch_build.py bakes frontend/dist into
      # the wheel; building without it would publish a backend-only wheel
      - name: Build SPA
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"

      - name: Build wheel
        run: uv build --wheel

      # Install the exact artifact we're about to publish into a clean venv
      # and boot it — same health/SPA gate as the sidecar smoke. Catches a
      # broken entry point or a wheel that silently missed the SPA bake.
      - name: Smoke-test the wheel
        run: |
          uv venv smoke
          uv pip install --python smoke/bin/python dist/*.whl
          smoke/bin/python - <<'PY'
          import pathlib
          import fermiviewer
          spa = pathlib.Path(fermiviewer.__file__).parent / "_spa" / "index.html"
          assert spa.is_file(), f"SPA was not baked into the wheel ({spa} missing)"
          PY
          smoke/bin/fv --no-browser --no-auto-shutdown &
          pid=$!
          ok=0
          for i in $(seq 1 40); do
            if curl -sf http://127.0.0.1:8000/api/health | grep -qE '"status": *"ok"'; then
              ok=1; break
            fi
            sleep 1
          done
          spa=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/ || echo 000)
          kill "$pid" 2>/dev/null || true
          if [ "$ok" != "1" ] || [ "$spa" != "200" ]; then
            echo "wheel smoke failed (health=$ok spa=$spa)"; exit 1
          fi
          echo "wheel healthy, SPA served"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
